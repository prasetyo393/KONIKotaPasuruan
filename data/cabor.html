<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porprov Kota Pasuruan — Pencapaian Gemilang</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/home.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="Navigasi utama">
        <div style="max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
            <a href="../index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
                <div
                    style="width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;">
                    <img src="../assets/LOGO KONI.png">
                </div>
                <span class="title" style="font-weight:800;font-size:16px;color:var(--fg);letter-spacing:-0.01em;">KONI
                    <span style="color:var(--accent);">Kota Pasuruan</span>
                </span>
            </a>
            <div style="display:flex;align-items:center;gap:4px;" id="navLinks">
                <a href="../index.html#tentang" class="nav-link">Tentang</a>
                <a href="prestasi.html" class="nav-link">Prestasi</a>
                <!-- <a href="#sejarah" class="nav-link">Sejarah</a> -->
                <a href="#unggulan" class="nav-link">Cabor</a>
                <a href="statistik.html" class="nav-link"
                    style="color:var(--gold);background:var(--gold-dim);">Lihat Data</a>
            </div>
        </div>
    </nav>

    <!-- Cabor Unggulan Section -->
    <section id="unggulan" style="padding:100px 24px;position:relative;z-index:1;">
        <canvas id="heroCanvas"></canvas>
        <div style="max-width:1280px;margin:0 auto;">
            <div class="reveal"
                style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:48px;">
                <div>
                    <div class="section-label"><i class="fa-solid fa-ranking-star"></i> Peringkat</div>
                    <h2 class="section-title">Cabang Olahraga Unggulan</h2>
                    <p class="section-desc">Cabor dengan perolehan medali terbanyak dari seluruh edisi Porprov.</p>
                </div>
                <div style="display:flex;gap:6px;" id="sportFilterBtns">
                    <button class="sport-filter-btn active" data-filter="all" onclick="filterSports('all')"
                        style="padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid transparent;cursor:pointer;transition:all 0.2s;color:var(--gold);background:var(--gold-dim);">Semua</button>
                    <button class="sport-filter-btn" data-filter="emas" onclick="filterSports('emas')"
                        style="padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid transparent;cursor:pointer;transition:all 0.2s;color:var(--muted);background:transparent;">Terbanyak
                        Emas</button>
                    <button class="sport-filter-btn" data-filter="total" onclick="filterSports('total')"
                        style="padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid transparent;cursor:pointer;transition:all 0.2s;color:var(--muted);background:transparent;">Terbanyak
                        Total</button>
                </div>
            </div>

            <div class="sport-grid reveal" id="sportGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <!-- Populated by JS -->
            </div>
        </div>
    </section>

    <footer style="border-top:1px solid var(--border);padding:24px 24px;position:relative;z-index:1;">
        <div style="max-width:1280px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div
                        style="width:34px;height:34px;border-radius:10px;background:var(--gold-dim);display:flex;align-items:center;justify-content:center;">
                        <i class="fa-solid fa-trophy" style="color:var(--gold);font-size:14px;"></i>
                    </div>
                    <span style="font-weight:800;font-size:15px;">Porprov<span
                            style="color:var(--gold);">Jatim</span></span>
                </div>
                <div style="display:flex;gap:24px;flex-wrap:wrap;">
                    <a href="../index.html#tentang">Tentang</a>
                    <a href="prestasi.html">Prestasi</a>
                    <a href="../index.html#sejarah">Sejarah</a>
                    <a href="#unggulan">Cabor</a>
                </div>
                <p style="font-size:12px;color:var(--muted);font-weight:500;">2025 — Data Porprov Kota Pasuruan</p>
            </div>
        </div>
    </footer>
    <div id="toast" class="toast"></div>


    <script src="../script/sub-page.js"></script>

</body>

</html>
